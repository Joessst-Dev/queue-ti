# LOCAL DEVELOPMENT ONLY — never use these values in production
server:
  port: 50051
  http_port: 8080

db:
  host: localhost
  port: 5432
  user: postgres
  password: postgres  # override with QUEUETI_DB_PASSWORD in production
  name: queueti
  sslmode: disable  # dev only — code default is 'require'; override with QUEUETI_DB_SSLMODE

queue:
  visibility_timeout: 30s
  # require_topic_registration: false  # when true, enqueue rejects unknown topics

auth:
  enabled: false
  username: admin
  password: secret
  jwt_secret: CHANGE_ME_USE_QUEUETI_AUTH_JWT_SECRET_ENV_VAR_IN_PRODUCTION
  # cors_origins defaults to "*" — set QUEUETI_SERVER_CORS_ORIGINS to restrict in production

# redis:
#   host: ""          # set to enable Redis-backed rate limiter (QUEUETI_REDIS_HOST)
#   port: 6379        # QUEUETI_REDIS_PORT
#   password: ""      # Redis AUTH password (QUEUETI_REDIS_PASSWORD) — required in production
#   tls_enabled: false  # enable TLS for Redis connections (QUEUETI_REDIS_TLS_ENABLED)
