name: Release

# Triggered by CalVer tags: vYYYY.MM.PATCH with an optional pre-release suffix.
# Examples: v2026.05.0, v2026.05.0-preview.1, v2026.05.1-rc.1
# The pattern v[0-9]* excludes accidental non-version tags (e.g. vfoo).
on:
  push:
    tags:
      - "v[0-9][0-9][0-9][0-9].[0-9][0-9].[0-9]*"

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # Job 1a: Go backend — build + test (gates the release)
  # Mirrors the backend job in ci.yml exactly so the release never ships code
  # that would have failed a normal CI run.
  # ─────────────────────────────────────────────────────────────────────────────
  backend:
    name: "Backend: Build & Test"
    runs-on: ubuntu-latest
    timeout-minutes: 15

    permissions:
      contents: read

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: queueti_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Go ${{ '1.25.5' }}
        uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
        with:
          go-version: "1.25.5"
          cache: true

      - name: Install dependencies (go mod tidy)
        run: make deps

      - name: Build backend binary
        run: go build -v ./backend/cmd/server/...

      - name: Install Ginkgo CLI
        run: go install github.com/onsi/ginkgo/v2/ginkgo@v2.28.1

      - name: Run Go tests (Ginkgo)
        run: make test

  # ─────────────────────────────────────────────────────────────────────────────
  # Job 1b: Angular frontend — build, test, lint (gates the release)
  # Runs in parallel with the backend job.
  # ─────────────────────────────────────────────────────────────────────────────
  frontend:
    name: "Frontend: Build, Test & Lint"
    runs-on: ubuntu-latest
    timeout-minutes: 15

    permissions:
      contents: read

    defaults:
      run:
        working-directory: ui

    env:
      NX_DAEMON: "false"
      NX_CLOUD_NO_TIMEOUTS: "true"
      NX_NO_CLOUD: "true"

    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Node.js 24
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version-file: "ui/.nvmrc"

      - name: Cache npm packages
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
        with:
          path: ~/.npm
          key: npm-${{ runner.os }}-${{ hashFiles('ui/package-lock.json') }}
          restore-keys: npm-${{ runner.os }}-

      - name: Pin npm version
        run: npm install -g npm@11.10.1

      - name: Install Node dependencies
        run: npm ci

      - name: Cache Nx computation cache
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
        with:
          path: ui/.nx/cache
          key: nx-${{ runner.os }}-${{ hashFiles('ui/package-lock.json') }}-${{ hashFiles('ui/src/**') }}
          restore-keys: |
            nx-${{ runner.os }}-${{ hashFiles('ui/package-lock.json') }}-
            nx-${{ runner.os }}-

      - name: Build Angular application (production)
        run: npx nx build

      - name: Run unit tests (Vitest, headless)
        run: npx nx test

      - name: Run ESLint
        run: npx nx lint

  # ─────────────────────────────────────────────────────────────────────────────
  # Job 1c: Node.js client — build, test, lint (gates the release)
  # Mirrors the node-client job in ci.yml exactly.
  # ─────────────────────────────────────────────────────────────────────────────
  node-client:
    name: "Node.js client: Build, Test & Lint"
    runs-on: ubuntu-latest
    timeout-minutes: 10

    permissions:
      contents: read

    defaults:
      run:
        working-directory: clients/node

    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version-file: "ui/.nvmrc"

      - name: Cache npm packages
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
        with:
          path: ~/.npm
          key: npm-node-client-${{ runner.os }}-${{ hashFiles('clients/node/package-lock.json') }}
          restore-keys: npm-node-client-${{ runner.os }}-

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Run tests
        run: npm test

      - name: Run ESLint
        run: npm run lint

  # ─────────────────────────────────────────────────────────────────────────────
  # Job 1d: Python client — test & lint (gates the release)
  # Mirrors the python-client job in ci.yml exactly.
  # ─────────────────────────────────────────────────────────────────────────────
  python-client:
    name: "Python client: Test & lint"
    runs-on: ubuntu-latest
    timeout-minutes: 10

    permissions:
      contents: read

    defaults:
      run:
        working-directory: clients/python

    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version-file: "clients/python/.python-version"

      - name: Cache pip packages
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-${{ hashFiles('clients/python/pyproject.toml') }}
          restore-keys: pip-${{ runner.os }}-

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run tests
        run: python -m pytest tests/ -q

      - name: Run mypy
        run: python -m mypy queueti/

  # ─────────────────────────────────────────────────────────────────────────────
  # Job 2: Build & push Docker image to GHCR
  # Only runs after all four gate jobs pass. Builds a multi-platform manifest
  # (linux/amd64 + linux/arm64) and pushes three conditional tags:
  #   - exact tag  — always (e.g. v2026.05.0-preview.1)
  #   - preview    — rolling pointer, only for tags containing "-preview"
  #   - latest     — rolling pointer, only for stable releases
  # ─────────────────────────────────────────────────────────────────────────────
  publish-image:
    name: "Docker: Build & push multi-arch image"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [backend, frontend, node-client, python-client]

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Docker Buildx
        # Required for multi-platform builds (linux/amd64 + linux/arm64) and
        # the GitHub Actions cache backend (type=gha).
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772 # v3.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate Docker metadata and tags
        # Produces three tags based on the release type:
        #   1. Exact tag — always emitted (e.g. v2026.05.0-preview.1)
        #   2. preview   — rolling pointer, only for tags containing "-preview"
        #   3. latest    — rolling pointer, only for stable (no -preview, no -rc)
        id: meta
        uses: docker/metadata-action@902fa8ec7d6ecbf8d84d538b9b233a880e428804 # v5.7.0
        with:
          images: ghcr.io/joessst-dev/queue-ti
          tags: |
            type=raw,value=${{ github.ref_name }}
            type=raw,value=preview,enable=${{ contains(github.ref_name, '-preview') }}
            type=raw,value=latest,enable=${{ !contains(github.ref_name, '-preview') && !contains(github.ref_name, '-rc') }}

      - name: Build and push multi-arch Docker image
        # Builds linux/amd64 and linux/arm64 in a single manifest list.
        # GHA cache keeps layer reuse between release runs without an external
        # registry cache — mode=max caches all intermediate layers.
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: BUILD_VERSION=${{ github.ref_name }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─────────────────────────────────────────────────────────────────────────────
  # Job 3: Publish @queue-ti/client to npm
  # Runs in parallel with publish-image after all gate jobs pass.
  # Version is derived from the CalVer tag (v2026.05.1 → 2026.5.1).
  # Pre-release tags (-preview, -rc) are published under the "next" dist-tag
  # so they don't overwrite the "latest" pointer on npm.
  # Requires NPM_TOKEN repository secret with publish access to @queue-ti/client.
  # ─────────────────────────────────────────────────────────────────────────────
  publish-npm:
    name: "npm: Publish @queue-ti/client"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [backend, frontend, node-client]

    permissions:
      contents: read
      id-token: write  # required for npm provenance attestation

    defaults:
      run:
        working-directory: clients/node

    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version-file: "ui/.nvmrc"
          registry-url: "https://registry.npmjs.org"

      - name: Cache npm packages
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
        with:
          path: ~/.npm
          key: npm-node-client-${{ runner.os }}-${{ hashFiles('clients/node/package-lock.json') }}
          restore-keys: npm-node-client-${{ runner.os }}-

      - name: Install dependencies
        run: npm ci

      - name: Set version from tag
        # Strip the leading "v" from the CalVer tag so npm gets a plain semver
        # (e.g. v2026.05.1 → 2026.5.1). --no-git-tag-version skips the git tag
        # and commit that npm version would otherwise create on the runner.
        run: |
          VERSION="${{ github.ref_name }}"
          npm version "${VERSION#v}" --no-git-tag-version

      - name: Build
        run: npm run build

      - name: Publish to npm
        # Scoped packages require --access public to be listed publicly.
        # Pre-releases are published under the "next" dist-tag so they don't
        # replace the "latest" pointer on npm.
        # --provenance attaches a signed build provenance to the package for
        # supply chain transparency (requires id-token: write above).
        run: |
          TAG="${{ github.ref_name }}"
          if [[ "$TAG" == *"-preview"* || "$TAG" == *"-rc"* ]]; then
            npm publish --access public --tag next --provenance
          else
            npm publish --access public --provenance
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  # ─────────────────────────────────────────────────────────────────────────────
  # Job 4: Publish queue-ti-client to PyPI
  # Runs in parallel with publish-image and publish-npm after all gate jobs pass.
  # Uses OIDC trusted publishing — no API token required. Requires a trusted
  # publisher configured on PyPI for this repo + workflow + environment.
  # CalVer tag is converted to PEP 440 before stamping pyproject.toml:
  #   v2026.05.0          → 2026.5.0     (stable)
  #   v2026.05.0-preview.1 → 2026.5.0a1  (alpha)
  #   v2026.05.0-rc.1     → 2026.5.0rc1  (release candidate)
  # Leading zeros are stripped from the month component (05 → 5).
  # ─────────────────────────────────────────────────────────────────────────────
  publish-pypi:
    name: "PyPI: Publish queue-ti-client"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [backend, frontend, node-client, python-client]

    permissions:
      contents: read
      id-token: write  # required for OIDC trusted publishing

    environment:
      name: pypi
      url: https://pypi.org/p/queue-ti-client

    defaults:
      run:
        working-directory: clients/python

    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version-file: "clients/python/.python-version"

      - name: Cache pip packages
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-${{ hashFiles('clients/python/pyproject.toml') }}
          restore-keys: pip-${{ runner.os }}-

      - name: Set version from tag
        # Convert CalVer tag to PEP 440 and stamp pyproject.toml.
        # The inline Python script handles three cases:
        #   -preview.N  → aN  (alpha pre-release)
        #   -rc.N       → rcN (release candidate)
        #   stable      → no suffix
        # Leading zeros are stripped from all numeric components (05 → 5).
        run: |
          PEP440=$(python3 - "${{ github.ref_name }}" <<'EOF'
          import re, sys
          v = sys.argv[1].lstrip('v')
          v = re.sub(r'-preview\.(\d+)$', lambda m: f'a{m.group(1)}', v)
          v = re.sub(r'-rc\.(\d+)$', lambda m: f'rc{m.group(1)}', v)
          # Strip leading zeros from each numeric component
          v = '.'.join(str(int(p)) if p.isdigit() else p for p in v.split('.'))
          print(v)
          EOF
          )
          echo "PEP440 version: $PEP440"
          sed -i "s/^version = .*/version = \"$PEP440\"/" pyproject.toml

      - name: Install build dependencies
        run: pip install build && pip install -e .

      - name: Build distribution packages
        run: python -m build

      - name: Publish to PyPI
        # OIDC trusted publishing — no PYPI_TOKEN secret needed.
        # Requires a trusted publisher configured on PyPI:
        #   Owner: Joessst-Dev  Repository: queue-ti
        #   Workflow: release.yml  Environment: pypi
        uses: pypa/gh-action-pypi-publish@76f52bc884231f62b9a034ebfe128415bbaabdfc # release/v1
        with:
          packages-dir: dist/

  # ─────────────────────────────────────────────────────────────────────────────
  # Job 5: Create GitHub Release
  # Runs after the image push and all publish jobs succeed. Uses the gh CLI
  # (pre-installed on ubuntu-latest) to create the release with auto-generated
  # notes from merged PRs. Pre-release flag is set automatically for -preview
  # and -rc tags.
  # ─────────────────────────────────────────────────────────────────────────────
  create-release:
    name: "GitHub: Create release"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [publish-image, publish-npm, publish-pypi]

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        # fetch-depth: 0 required to push the client sub-module tag back to the remote.
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Tag client Go sub-module
        # Creates client/vYYYY.MM.PATCH on the same commit so the client library
        # is consumable as a Go module:
        #   go get github.com/Joessst-Dev/queue-ti/client@vYYYY.MM.PATCH
        # Note: replace directives in client/go.mod are ignored by downstream
        # consumers, so the local ../  replace does not affect published releases.
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "client/${{ github.ref_name }}" "${{ github.sha }}"
          git push origin "client/${{ github.ref_name }}"

      - name: Create GitHub Release
        # --generate-notes  auto-generates release notes from merged PRs since
        #                   the previous tag — no manual changelog needed.
        # --prerelease      set when the tag contains "-preview" or "-rc".
        # --verify-tag      fails fast if the tag does not exist on the remote,
        #                   guarding against a race between push and release creation.
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.ref_name }}"
          PRERELEASE_FLAG=""
          if [[ "$TAG" == *"-preview"* || "$TAG" == *"-rc"* ]]; then
            PRERELEASE_FLAG="--prerelease"
          fi
          gh release create "$TAG" \
            --title "$TAG" \
            --generate-notes \
            --verify-tag \
            $PRERELEASE_FLAG
