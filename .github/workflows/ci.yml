name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Limit concurrent runs on the same ref: cancel in-flight runs on new pushes,
# but never cancel runs on the main branch (let them finish for accurate status).
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  contents: read

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # Job 1: Go backend — build + test
  # Tests use testcontainers-go, which spins up PostgreSQL containers
  # programmatically via the Docker socket available on ubuntu-latest runners.
  # One package (internal/queue) uses a hard-coded localhost:5432 DSN, so we
  # also start a GitHub Actions service container to satisfy that dependency.
  # ─────────────────────────────────────────────────────────────────────────────
  backend:
    name: "Backend: Build & Test"
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      # Satisfies internal/queue/service_test.go which hard-codes
      # postgres://postgres:postgres@localhost:5432/queueti_test
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: queueti_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Go ${{ '1.25.5' }}
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.25.5"
          # actions/setup-go caches the module download cache (~/.cache/go) and
          # the build cache (~/.cache/go-build) automatically when cache: true
          # (the default). Cache key is derived from go.sum.
          cache: true
          cache-dependency-path: backend/go.sum

      - name: Install dependencies (go mod tidy)
        run: make deps

      - name: Build backend binary
        # Compile the server to catch any build-breaking errors before running
        # the full test suite, which is slower due to testcontainers startup.
        run: go build -v ./backend/cmd/server/...

      - name: Install Ginkgo CLI
        # Install the ginkgo binary so `make test` / `ginkgo ./...` works.
        # Using `go install` ensures the version is tied to the go.sum entry.
        run: go install github.com/onsi/ginkgo/v2/ginkgo@v2.28.1

      - name: Run Go tests (Ginkgo)
        # make test runs: ginkgo ./...
        # -r  = recurse into subdirectories
        # --randomize-all = catch order-dependent bugs
        # --fail-fast = bail on the first suite failure for faster feedback
        # Testcontainers packages pull the postgres:16-alpine image on first run;
        # subsequent runs hit the Docker layer cache on the same runner.
        run: make test

  # ─────────────────────────────────────────────────────────────────────────────
  # Job 2: Angular frontend — build, test, lint
  # Runs in parallel with the backend job.
  # All Nx commands are run from admin-ui/ because nx.json and project.json live
  # there; the Nx daemon is disabled to avoid background process cleanup issues
  # in CI.
  # ─────────────────────────────────────────────────────────────────────────────
  frontend:
    name: "Frontend: Build, Test & Lint"
    runs-on: ubuntu-latest
    timeout-minutes: 15

    defaults:
      run:
        working-directory: ui

    env:
      # Disable the Nx daemon in CI — it adds no benefit and can leave orphan
      # processes that confuse the runner.
      NX_DAEMON: "false"
      # Nx telemetry is off in CI to avoid noise and latency.
      NX_CLOUD_NO_TIMEOUTS: "true"
      NX_NO_CLOUD: "true"

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Node.js 24
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: "ui/.nvmrc"

      - name: Cache npm packages
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.npm
          key: npm-${{ runner.os }}-${{ hashFiles('ui/package-lock.json') }}
          restore-keys: npm-${{ runner.os }}-

      - name: Pin npm version
        run: npm install -g npm@11.10.1

      - name: Install Node dependencies
        run: npm ci

      - name: Cache Nx computation cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ui/.nx/cache
          # Nx cache is keyed on the lockfile + all source files via a hash;
          # we use the lockfile as the primary key and fall back to any prior
          # cache for the same branch prefix for partial hits.
          key: nx-${{ runner.os }}-${{ hashFiles('ui/package-lock.json') }}-${{ hashFiles('ui/src/**') }}
          restore-keys: |
            nx-${{ runner.os }}-${{ hashFiles('ui/package-lock.json') }}-
            nx-${{ runner.os }}-

      - name: Build Angular application (production)
        # Builds to admin-ui/dist/admin-ui/browser via @angular/build:application.
        # Runs production configuration by default (set in project.json).
        run: npx nx build

      - name: Run unit tests (Vitest, headless)
        # @angular/build:unit-test executor runs Vitest. No browser needed.
        run: npx nx test

      - name: Run ESLint
        run: npx nx lint

      - name: Upload build artifact
        # Upload the production build so it can be downloaded from the Actions UI
        # or used by a subsequent deploy job.
        if: success()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: admin-ui-dist-${{ github.sha }}
          path: ui/dist/admin-ui/
          retention-days: 7

  # ─────────────────────────────────────────────────────────────────────────────
  # Job 3: Node.js client — build and test
  # ─────────────────────────────────────────────────────────────────────────────
  node-client:
    name: "Node.js client: Build & Test"
    runs-on: ubuntu-latest
    timeout-minutes: 10

    defaults:
      run:
        working-directory: clients/node

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: "ui/.nvmrc"

      - name: Cache npm packages
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.npm
          key: npm-node-client-${{ runner.os }}-${{ hashFiles('clients/node/package-lock.json') }}
          restore-keys: npm-node-client-${{ runner.os }}-

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Run tests
        run: npm test

      - name: Run ESLint
        run: npm run lint

  # ─────────────────────────────────────────────────────────────────────────────
  # Job 4: Python client — lint and test
  # ─────────────────────────────────────────────────────────────────────────────
  python-client:
    name: "Python client: Test"
    runs-on: ubuntu-latest
    timeout-minutes: 10

    defaults:
      run:
        working-directory: clients/python

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version-file: "clients/python/.python-version"

      - name: Cache pip packages
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-${{ hashFiles('clients/python/pyproject.toml') }}
          restore-keys: pip-${{ runner.os }}-

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run tests
        run: python -m pytest tests/ -q

      - name: Run mypy
        run: python -m mypy queueti/

  # ─────────────────────────────────────────────────────────────────────────────
  # Job 5: Go client — build and test
  # ─────────────────────────────────────────────────────────────────────────────
  go-client:
    name: "Go client: Build & Test"
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Go 1.25.5
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.25.5"
          cache-dependency-path: |
            clients/go/go.sum

      - name: Install Ginkgo CLI
        run: go install github.com/onsi/ginkgo/v2/ginkgo@v2.28.1

      - name: Build Go client
        working-directory: clients/go
        run: go build ./...

      - name: Run Go client tests
        working-directory: clients/go
        run: ginkgo ./...

  # ─────────────────────────────────────────────────────────────────────────────
  # Job 6: Docker image build (dry run)
  # Validates the multi-stage Dockerfile on every push and PR so regressions
  # are caught before they block a release. No image is pushed — amd64 only is
  # sufficient for regression detection; arm64 cross-compilation would double
  # build time with no additional signal at this stage.
  # ─────────────────────────────────────────────────────────────────────────────
  build-image:
    name: "Docker: Build image (dry run)"
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Docker Buildx
        # Buildx is required for cache-from/cache-to with type=gha and for
        # multi-platform builds in the release workflow.
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Build Docker image (no push)
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: false
          platforms: linux/amd64
          # Build arm64 in CI would double the time; amd64 is sufficient for
          # regression detection. The release workflow builds both platforms.
          cache-from: type=gha
          cache-to: type=gha,mode=max
