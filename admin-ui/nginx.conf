server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Serve pre-compressed brotli/gzip files when available
    gzip_static on;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        resolver 127.0.0.11 valid=30s;
        set $backend http://queueti:8080;
        proxy_pass $backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Cache hashed static assets for 1 year
    location ~* \.[0-9a-f]+\.(js|css|mjs)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Short cache for images and fonts
    location ~* \.(avif|webp|png|jpg|jpeg|svg|ico|woff2|woff)$ {
        expires 30d;
        add_header Cache-Control "public";
    }
}
